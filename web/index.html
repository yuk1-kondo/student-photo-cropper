<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Photo Cropper Web</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <h1>証明写真ローカル処理</h1>
          <p>
            画像は端末内のブラウザで処理します。顔検出、3cm x 4cmトリミング、
            容量調整、CSV順リネーム、ZIP保存まで行えます。
          </p>
        </div>
        <div class="status-card">
          <span id="modelStatus" class="status-dot">モデル未読込</span>
          <button id="loadModelButton" type="button">顔検出モデルを読み込む</button>
        </div>
      </section>

      <section class="panel">
        <h2>入力</h2>
        <div class="control-grid">
          <label>
            写真フォルダまたは複数画像
            <input id="imageInput" type="file" accept="image/*" multiple webkitdirectory />
          </label>
          <label>
            リネームCSV 任意
            <input id="csvInput" type="file" accept=".csv,text/csv" />
          </label>
        </div>
        <p class="note">
          CSVを指定した場合、画像ファイル名の昇順とCSVの行順を対応させます。
          1列目の値が出力ファイル名になります。
        </p>
      </section>

      <section class="panel">
        <h2>出力設定</h2>
        <div class="control-grid">
          <label>
            プリセット
            <select id="presetSelect">
              <option value="standard">3cm x 4cm / 300dpi / 100KB</option>
              <option value="high">3cm x 4cm / 900dpi / 500KB</option>
            </select>
          </label>
          <label>
            DPI
            <input id="dpiInput" type="number" min="72" max="1200" value="300" />
          </label>
          <label>
            最大容量 KB
            <input id="maxKbInput" type="number" min="20" max="2000" value="100" />
          </label>
        </div>
        <p class="note">
          通常はプリセットだけ選べば十分です。顔まわりの構図はPython版と同じ初期値で自動調整します。
        </p>

        <details class="advanced-settings">
          <summary>詳細設定</summary>
          <div class="advanced-copy">
            <p>
              基準値はPython版と同じです。迷った場合は変更せず、プレビューや出力結果を見て必要な時だけ調整してください。
            </p>
          </div>
          <div class="control-grid">
            <label>
              顔の大きさ
              <input id="faceRatioInput" type="number" min="0.25" max="0.6" step="0.01" value="0.42" />
              <span class="help-text">
                既定値 0.42。数値を上げると顔が大きくなり、肩や胸元は少なめになります。
                下げると顔が小さくなり、肩や上半身が多めに入ります。目安は 0.38〜0.46。
              </span>
            </label>
            <label>
              頭上余白
              <input id="headroomInput" type="number" min="0.2" max="1.0" step="0.01" value="0.55" />
              <span class="help-text">
                既定値 0.55。数値を上げると頭上の余白が増え、顔は少し下に寄ります。
                下げると頭上余白が減ります。髪が切れそうな時は 0.60〜0.65。
              </span>
            </label>
            <label>
              検出信頼度
              <input id="confidenceInput" type="number" min="0.3" max="0.99" step="0.01" value="0.85" />
              <span class="help-text">
                既定値 0.85。数値を上げると確実な顔だけ採用し、要確認が増えます。
                下げると検出しやすくなりますが、誤検出も増えます。通常は 0.80〜0.90。
              </span>
            </label>
          </div>
          <button id="resetAdvancedButton" class="secondary-button" type="button">Python版の初期値に戻す</button>
        </details>
      </section>

      <section class="action-row">
        <button id="processButton" type="button" disabled>処理してZIP保存</button>
        <button id="clearButton" type="button">ログを消す</button>
      </section>

      <section class="summary-grid">
        <div><strong id="imageCount">0</strong><span>画像</span></div>
        <div><strong id="okCount">0</strong><span>成功</span></div>
        <div><strong id="reviewCount">0</strong><span>要確認</span></div>
        <div><strong id="outputSize">354 x 472</strong><span>px</span></div>
      </section>

      <section class="panel">
        <h2>処理ログ</h2>
        <pre id="log" class="log"></pre>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
