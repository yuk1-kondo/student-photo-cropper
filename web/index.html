<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Photo Cropper Web</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <h1>証明写真ローカル処理</h1>
          <p>
            画像は端末内のブラウザで処理します。顔検出、3cm x 4cmトリミング、
            容量調整、CSV順リネーム、ZIP保存まで行えます。
          </p>
        </div>
        <div class="status-card">
          <span id="modelStatus" class="status-dot">モデル未読込</span>
          <button id="loadModelButton" type="button">顔検出モデルを読み込む</button>
        </div>
      </section>

      <section class="panel">
        <h2>入力</h2>
        <div class="control-grid">
          <label>
            写真フォルダまたは複数画像
            <input id="imageInput" type="file" accept="image/*" multiple webkitdirectory />
          </label>
          <label>
            リネームCSV 任意
            <input id="csvInput" type="file" accept=".csv,text/csv" />
          </label>
        </div>
        <p class="note">
          CSVを指定した場合、画像ファイル名の昇順とCSVの行順を対応させます。
          1列目の値が出力ファイル名になります。
        </p>
      </section>

      <section class="panel">
        <h2>出力設定</h2>
        <div class="control-grid">
          <label>
            プリセット
            <select id="presetSelect">
              <option value="standard">3cm x 4cm / 300dpi / 100KB</option>
              <option value="high">3cm x 4cm / 900dpi / 500KB</option>
            </select>
          </label>
          <label>
            DPI
            <input id="dpiInput" type="number" min="72" max="1200" value="300" />
          </label>
          <label>
            最大容量 KB
            <input id="maxKbInput" type="number" min="20" max="2000" value="100" />
          </label>
          <label>
            顔の大きさ
            <input id="faceRatioInput" type="number" min="0.25" max="0.6" step="0.01" value="0.42" />
          </label>
          <label>
            頭上余白
            <input id="headroomInput" type="number" min="0.2" max="1.0" step="0.01" value="0.55" />
          </label>
          <label>
            検出信頼度
            <input id="confidenceInput" type="number" min="0.3" max="0.99" step="0.01" value="0.85" />
          </label>
        </div>
      </section>

      <section class="action-row">
        <button id="processButton" type="button" disabled>処理してZIP保存</button>
        <button id="clearButton" type="button">ログを消す</button>
      </section>

      <section class="summary-grid">
        <div><strong id="imageCount">0</strong><span>画像</span></div>
        <div><strong id="okCount">0</strong><span>成功</span></div>
        <div><strong id="reviewCount">0</strong><span>要確認</span></div>
        <div><strong id="outputSize">354 x 472</strong><span>px</span></div>
      </section>

      <section class="panel">
        <h2>処理ログ</h2>
        <pre id="log" class="log"></pre>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
